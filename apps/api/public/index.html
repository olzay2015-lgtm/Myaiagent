<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AI Agent - Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131a;
            --bg-tertiary: #1c1c26;
            --bg-hover: #252532;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border-color: #27272a;
            --success: #22c55e;
            --error: #ef4444;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }

        .app-container {
            display: flex;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .new-chat-btn {
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .agents-section {
            flex: 1;
            overflow-y: auto;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding: 0 12px;
        }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 4px;
        }

        .agent-item:hover {
            background: var(--bg-hover);
        }

        .agent-item.active {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }

        .agent-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .agent-info {
            flex: 1;
            min-width: 0;
        }

        .agent-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .agent-desc {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }

        .chat-header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .header-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .header-btn.primary {
            background: var(--accent-gradient);
            border: none;
            color: white;
        }

        /* Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-gradient);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 500px;
            line-height: 1.6;
        }

        .message {
            display: flex;
            gap: 16px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--accent-gradient);
        }

        .message.assistant .message-avatar {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }

        .message-content {
            max-width: 70%;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--accent-gradient);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .chat-input-container {
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px;
            transition: all 0.2s;
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            resize: none;
            max-height: 150px;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-button {
            background: var(--accent-gradient);
            border: none;
            border-radius: 10px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .send-button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Schedule Modal */
        .schedule-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .schedule-modal.active {
            display: flex;
        }

        .schedule-modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 90%;
            max-width: 480px;
            overflow: hidden;
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .schedule-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .schedule-modal-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .schedule-modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .quick-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .quick-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .schedule-list {
            margin-top: 24px;
            max-height: 300px;
            overflow-y: auto;
        }

        .schedule-item {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .schedule-item-info {
            flex: 1;
            min-width: 0;
        }

        .schedule-item-message {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .schedule-item-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .schedule-item-delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .schedule-item-delete:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .no-tasks {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: var(--success);
            border-radius: 20px;
            font-size: 12px;
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <div class="logo-text">AI Agent</div>
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <span>+</span> New Chat
            </button>

            <div class="agents-section">
                <div class="section-title">Your Agents</div>
                <div id="agentsList"></div>
            </div>

            <div class="section-title" style="margin-top: 20px;">Tools</div>
            <div class="agent-item">
                <div class="agent-avatar">🌐</div>
                <div class="agent-info">
                    <div class="agent-name">Web Search</div>
                    <div class="agent-desc">DuckDuckGo</div>
                </div>
            </div>
            <div class="agent-item">
                <div class="agent-avatar">📅</div>
                <div class="agent-info">
                    <div class="agent-name">Scheduler</div>
                    <div class="agent-desc">Telegram reminders</div>
                </div>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="chat-header-title">
                    <h1 id="chatTitle">AI Assistant</h1>
                    <span class="status-badge">Online</span>
                </div>
                <div class="header-actions">
                    <button class="header-btn" id="scheduleBtn">
                        📅 Schedule
                    </button>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">✨</div>
                    <h2 class="welcome-title">How can I help you today?</h2>
                    <p class="welcome-subtitle">Choose an agent from the sidebar or start a new conversation. I can search the web, answer questions, and help you with tasks.</p>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="message-avatar">🤖</div>
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea 
                        class="chat-input" 
                        id="messageInput" 
                        placeholder="Message AI Agent..."
                        rows="1"
                    ></textarea>
                    <button class="send-button" id="sendButton">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Schedule Modal -->
    <div class="schedule-modal" id="scheduleModal">
        <div class="schedule-modal-content">
            <div class="schedule-modal-header">
                <h2>📅 Schedule Task</h2>
                <button class="close-btn" id="closeScheduleModal">×</button>
            </div>
            <div class="schedule-modal-body">
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="scheduleMessage" rows="2" placeholder="Reminder message..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Date & Time</label>
                    <input type="datetime-local" id="scheduleDateTime">
                </div>

                <div class="quick-buttons">
                    <button class="quick-btn" onclick="setQuickSchedule(5, 'min')">+5 min</button>
                    <button class="quick-btn" onclick="setQuickSchedule(1, 'hour')">+1 hour</button>
                    <button class="quick-btn" onclick="setQuickSchedule(24, 'hour')">Tomorrow</button>
                    <button class="quick-btn" onclick="setQuickSchedule(7, 'day')">+1 week</button>
                </div>

                <button class="submit-btn" onclick="createScheduledTask()">
                    Schedule Task
                </button>

                <div class="schedule-list" id="scheduleList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let currentAgent = null;
        let conversationHistory = [];
        let scheduledTasks = [];

        // Load agents
        async function loadAgents() {
            try {
                const response = await fetch(`${API_URL}/agents`);
                const data = await response.json();
                
                const agents = data.agents || data.data?.agents || [];
                if (agents.length > 0) {
                    const list = document.getElementById('agentsList');
                    list.innerHTML = '';
                    
                    agents.forEach(agent => {
                        const div = document.createElement('div');
                        div.className = 'agent-item';
                        div.dataset.id = agent.id;
                        div.innerHTML = `
                            <div class="agent-avatar">🤖</div>
                            <div class="agent-info">
                                <div class="agent-name">${agent.name}</div>
                                <div class="agent-desc">${agent.role || agent.description || ''}</div>
                            </div>
                        `;
                        div.addEventListener('click', () => selectAgent(agent.id, agent.name));
                        list.appendChild(div);
                    });

                    // Auto-select first agent
if (agents.length > 0) {
                        selectAgent(agents[0].id, agents[0].name);
                        list.children[0]?.classList.add('active');
                    }
                }
            } catch (error) {
                console.error('Error loading agents:', error);
            }
        }

        function selectAgent(agentId, agentName) {
            currentAgent = agentId;
            conversationHistory = [];
            
            document.querySelectorAll('.agent-item').forEach(item => {
                item.classList.toggle('active', item.dataset.id === agentId);
            });
            
            document.getElementById('chatTitle').textContent = agentName;
            
            // Load conversation history
            loadConversation(agentId, agentName);
        }

        async function loadConversation(agentId, agentName) {
            try {
                const response = await fetch(`${API_URL}/chat/${agentId}`);
                const data = await response.json();
                
                const messagesContainer = document.getElementById('chatMessages');
                messagesContainer.innerHTML = '';
                
                if (data.success && data.data.history && data.data.history.length > 0) {
                    // Show conversation history
                    data.data.history.forEach(msg => {
                        addMessage(msg.role, msg.content);
                    });
                    conversationHistory = data.data.history;
                } else {
                    messagesContainer.innerHTML = `
                        <div class="welcome-screen">
                            <div class="welcome-icon">✨</div>
                            <h2 class="welcome-title">${agentName}</h2>
                            <p class="welcome-subtitle">Start a conversation with ${agentName}.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading conversation:', error);
                const messagesContainer = document.getElementById('chatMessages');
                messagesContainer.innerHTML = `
                    <div class="welcome-screen">
                        <div class="welcome-icon">✨</div>
                        <h2 class="welcome-title">${agentName}</h2>
                        <p class="welcome-subtitle">Start a conversation with ${agentName}.</p>
                    </div>
                `;
            }
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const button = document.getElementById('sendButton');
            const message = input.value.trim();

            if (!message) return;
            if (!currentAgent) {
                alert('Please select an agent');
                return;
            }

            // Remove welcome screen
            const welcome = document.getElementById('welcomeScreen');
            if (welcome) welcome.remove();

            addMessage('user', message);
            input.value = '';
            button.disabled = true;
            showTypingIndicator();

            try {
                const response = await fetch(`${API_URL}/chat/${currentAgent}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history: conversationHistory })
                });

                const data = await response.json();
                hideTypingIndicator();

                if (data.success) {
                    addMessage('assistant', data.data.message.content);
                    conversationHistory.push(
                        { role: 'user', content: message },
                        { role: 'assistant', content: data.data.message.content }
                    );
                }
            } catch (error) {
                hideTypingIndicator();
                console.error('Error:', error);
            } finally {
                button.disabled = false;
                input.focus();
            }
        }

        function addMessage(role, content) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'user' ? '👤' : '🤖';

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function showTypingIndicator() {
            document.getElementById('typingIndicator').classList.add('active');
            scrollToBottom();
        }

        function hideTypingIndicator() {
            document.getElementById('typingIndicator').classList.remove('active');
        }

        function scrollToBottom() {
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        document.getElementById('sendButton').addEventListener('click', sendMessage);

        document.getElementById('newChatBtn').addEventListener('click', () => {
            conversationHistory = [];
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.innerHTML = `
                <div class="welcome-screen">
                    <div class="welcome-icon">✨</div>
                    <h2 class="welcome-title">How can I help you today?</h2>
                    <p class="welcome-subtitle">Choose an agent from the sidebar or start a new conversation.</p>
                </div>
            `;
        });

        // Schedule Modal
        const scheduleModal = document.getElementById('scheduleModal');
        const scheduleBtn = document.getElementById('scheduleBtn');
        const closeScheduleModal = document.getElementById('closeScheduleModal');

        scheduleBtn.addEventListener('click', () => {
            scheduleModal.classList.add('active');
            loadScheduledTasks();
        });

        closeScheduleModal.addEventListener('click', () => {
            scheduleModal.classList.remove('active');
        });

        scheduleModal.addEventListener('click', (e) => {
            if (e.target === scheduleModal) {
                scheduleModal.classList.remove('active');
            }
        });

        function setQuickSchedule(amount, unit) {
            const now = new Date();
            const input = document.getElementById('scheduleDateTime');
            
            if (unit === 'min') now.setMinutes(now.getMinutes() + amount);
            else if (unit === 'hour') now.setHours(now.getHours() + amount);
            else if (unit === 'day') now.setDate(now.getDate() + amount);
            
            input.value = now.toISOString().slice(0, 16);
        }

        async function loadScheduledTasks() {
            try {
                const response = await fetch(`${API_URL}/schedule`);
                const data = await response.json();
                scheduledTasks = data.success ? data.data : [];
                renderScheduleList();
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        }

        function renderScheduleList() {
            const list = document.getElementById('scheduleList');
            
            if (scheduledTasks.length === 0) {
                list.innerHTML = '<div class="no-tasks">No scheduled tasks</div>';
                return;
            }
            
            list.innerHTML = scheduledTasks.map(task => {
                const date = new Date(task.scheduledTime);
                const dateStr = date.toLocaleString('en-US', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                return `
                    <div class="schedule-item">
                        <div class="schedule-item-info">
                            <div class="schedule-item-message">${escapeHtml(task.message)}</div>
                            <div class="schedule-item-time">📅 ${dateStr}</div>
                        </div>
                        <button class="schedule-item-delete" onclick="deleteTask('${task.id}')">Delete</button>
                    </div>
                `;
            }).join('');
        }

        async function createScheduledTask() {
            const message = document.getElementById('scheduleMessage').value.trim();
            const dateTime = document.getElementById('scheduleDateTime').value;
            const chatId = '5238995969';
            
            if (!message) { alert('Enter message'); return; }
            if (!dateTime) { alert('Select date & time'); return; }
            
            try {
                await fetch(`${API_URL}/schedule`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        scheduledTime: new Date(dateTime).toISOString(),
                        chatId
                    })
                });
                
                document.getElementById('scheduleMessage').value = '';
                document.getElementById('scheduleDateTime').value = '';
                loadScheduledTasks();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function deleteTask(taskId) {
            try {
                await fetch(`${API_URL}/schedule/${taskId}`, { method: 'DELETE' });
                loadScheduledTasks();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Initialize
        loadAgents();
    </script>
</body>
</html>
